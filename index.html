<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chur · Optimize Your Rewards</title>
    <style>
        :root {
            --chur-off-white: #F3EFE4;
            --chur-olive: #5C5A33;
            --chur-dark-gray: #333333;
            --chur-medium-gray: #888888;
            --card-chase: #104b9b;
            --card-amex: #d4af37;
            --card-gold: #c5a059;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--chur-off-white); 
            color: var(--chur-dark-gray);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: ui-rounded, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Dot Grid Background translated from your SwiftUI Canvas */
        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--chur-olive) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.08;
            mask-image: radial-gradient(circle, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 80%);
            z-index: -1;
        }

        .content-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 28px;
            max-width: 400px;
        }

        /* Card Stack Container */
        .stack-container {
            position: relative;
            width: 240px;
            height: 152px; /* width * 0.63 */
            margin-bottom: 80px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 240px;
            height: 152px;
            border-radius: 14px; /* width * 0.06 */
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            box-shadow: 0 14px 15px rgba(0,0,0,0.22);
            transition: all 0.7s cubic-bezier(0.3, 0.9, 0.3, 1);
        }

        /* Card Content Styling */
        .card-issuer { font-weight: 900; font-size: 11px; letter-spacing: 1.5px; text-align: left; }
        .card-name { font-weight: 600; font-size: 12px; text-align: left; }
        .chip { width: 26px; height: 20px; background: #D4B483; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.3); }

        /* Specific Cards */
        .card-1 { background: linear-gradient(135deg, var(--card-chase), #0a3166); z-index: 10; }
        .card-2 { background: linear-gradient(135deg, var(--card-amex), #a38629); z-index: 9; }
        .card-3 { background: linear-gradient(135deg, var(--card-gold), #8e7340); z-index: 8; }

        /* Stack Offset Logic from SwiftUI: 
           yOffset = stackOffset * 12, scale = 1 - stackOffset * 0.06, rotation = (stackOffset - 1) * 3 
        */
        .card-1 { transform: translateY(0px) scale(1) rotate(-3deg); }
        .card-2 { transform: translateY(12px) scale(0.94) rotate(0deg); opacity: 0.85; }
        .card-3 { transform: translateY(24px) scale(0.88) rotate(3deg); opacity: 0.70; }

        /* Auto-cycling Animation */
        @keyframes cycle {
            0%, 30% { transform: translateY(0px) scale(1) rotate(-3deg); z-index: 10; opacity: 1; }
            33%, 63% { transform: translateY(12px) scale(0.94) rotate(0deg); z-index: 9; opacity: 0.85; }
            66%, 96% { transform: translateY(24px) scale(0.88) rotate(3deg); z-index: 8; opacity: 0.7; }
            100% { transform: translateY(0px) scale(1) rotate(-3deg); z-index: 10; opacity: 1; }
        }

        .text-group h1 {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 4px;
        }

        .text-group h2 {
            font-size: 24px;
            font-weight: 500;
            color: var(--chur-olive);
            margin-bottom: 12px;
        }

        .text-group p {
            font-size: 16px;
            color: var(--chur-medium-gray);
            line-height: 1.4;
        }

        .badge {
            position: absolute;
            top: -14px;
            right: -10px;
            background: var(--chur-olive);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 6px 18px rgba(92, 90, 51, 0.35);
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="dot-grid"></div>

    <div class="content-stack">
        <div class="stack-container">
            <div class="card card-1">
                <div class="badge">5x This location ✨</div>
                <div style="display: flex; justify-content: space-between;">
                    <div class="card-issuer">CHUR</div>
                    <div class="chip"></div>
                </div>
                <div class="card-name">Best card</div>
            </div>
            <div class="card card-2">
                <div style="display: flex; justify-content: space-between;">
                    <div class="card-issuer">MY BANK</div>
                    <div class="chip"></div>
                </div>
                <div class="card-name">Diamond</div>
            </div>
            <div class="card card-3">
                <div style="display: flex; justify-content: space-between;">
                    <div class="card-issuer">CARD</div>
                    <div class="chip"></div>
                </div>
                <div class="card-name">Gold</div>
            </div>
        </div>

        <div class="text-group">
            <h1>Chur</h1>
            <h2>Track your rewards</h2>
            <p>Chur picks the best card in your wallet for every purchase. Free, private, simple.</p>
        </div>
    </div>

</body>
</html>
