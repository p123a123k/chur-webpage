<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chur · Organize Your Rewards</title>
    <style>
        :root {
            --bg-color: #F3EFE4;
            --text-main: #5C5A33;
            --text-muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: ui-rounded, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 80px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 60px;
        }

        /* The Animated Polaroid Stack */
        .stack-container {
            position: relative;
            width: 240px;
            height: 300px;
            margin: 0 auto 40px auto;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 4px;
            padding: 12px 12px 35px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            background: #e8e4d8;
            border-radius: 2px;
        }

        /* Initial Stacked Positions */
        .card-1 { transform: rotate(-6deg) translateY(10px); z-index: 1; }
        .card-2 { transform: rotate(4deg) translateY(5px); z-index: 2; }
        .card-3 { transform: rotate(-2deg); z-index: 3; }

        /* Animation Trigger */
        .stack-container:hover .card-1 { transform: translate(-120px, -20px) rotate(-12deg); }
        .stack-container:hover .card-2 { transform: translate(120px, -15px) rotate(10deg); }
        .stack-container:hover .card-3 { transform: translateY(-30px) scale(1.05); }

        .status-pill {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(92, 90, 51, 0.08);
            color: var(--text-main);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        footer {
            position: fixed;
            bottom: 30px;
            font-size: 13px;
            color: var(--text-muted);
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-pill">Coming Soon</div>
        <h1>Chur</h1>
        <p class="tagline">Your credit card rewards, organized.</p>
        
        <div class="stack-container">
            <div class="card card-1"><div class="card-inner"></div></div>
            <div class="card card-2"><div class="card-inner"></div></div>
            <div class="card card-3"><div class="card-inner"></div></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Chur App · Built with SwiftUI
    </footer>
</body>
</html>
