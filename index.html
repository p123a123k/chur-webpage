<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chur</title>
    <style>
        :root {
            --chur-off-white: #F3EFE4;
            --chur-olive: #5C5A33;
            --chur-medium-gray: #888888;
            --card-chase: #104b9b;
            --card-amex: #d4af37;
            --card-grocery: #1a7a4d; /* Green for Grocery */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--chur-off-white); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start; /* Move content up */
            min-height: 100vh; 
            font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
            overflow: hidden;
            text-align: center;
            padding-top: 8vh; /* Controlled space from top */
        }

        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--chur-olive) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.08;
            mask-image: radial-gradient(circle, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 80%);
            z-index: -1;
        }

        /* "Coming Soon" moved above header */
        .coming-soon-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--chur-medium-gray);
            margin-bottom: 8px;
        }

        h1 {
            color: var(--chur-olive);
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 60px;
            line-height: 1;
        }

        .stack-container {
            position: relative;
            width: 240px;
            height: 180px;
            margin-bottom: 40px;
        }

        .card {
            position: absolute;
            width: 240px;
            height: 152px;
            border-radius: 14px;
            padding: 18px;
            color: white;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.8s ease;
        }

        /* Card 1: Color Transition Animation */
        .card-1 { 
            z-index: 3; 
            transform: rotate(-4deg);
            animation: cardColorSwap 6s infinite;
        }
        .card-2 { background: var(--card-amex); transform: rotate(2deg) translateY(12px) scale(0.96); z-index: 2; opacity: 0.9; }
        .card-3 { background: #c5a059; transform: rotate(6deg) translateY(24px) scale(0.92); z-index: 1; opacity: 0.7; }

        @keyframes cardColorSwap {
            0%, 45% { background: linear-gradient(135deg, var(--card-chase), #0a3166); }
            55%, 100% { background: linear-gradient(135deg, var(--card-grocery), #115234); }
        }

        /* Badge text transition */
        .badge {
            position: absolute;
            top: -16px;
            right: -12px;
            background: var(--chur-olive);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 6px 18px rgba(92, 90, 51, 0.4);
            white-space: nowrap;
        }

        .badge::after {
            content: "5x Rewards at ABCD cafe ✨";
            animation: badgeTextSwap 6s infinite;
        }

        @keyframes badgeTextSwap {
            0%, 45% { content: "5x Rewards at ABCD cafe ✨"; }
            55%, 100% { content: "6x Rewards at Super Grocery 🛒"; }
        }

        .card-issuer { font-weight: 900; font-size: 10px; letter-spacing: 1.5px; text-align: left; }
        .chip { width: 24px; height: 18px; background: #D4B483; border-radius: 3px; opacity: 0.8; }

        .hero-footer {
            font-size: 28px;
            font-weight: 600;
            color: var(--chur-olive);
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        .highlight { color: var(--chur-medium-gray); font-weight: 400; }

        .copyright {
            margin-top: auto;
            padding-bottom: 30px;
            font-size: 13px;
            color: var(--chur-medium-gray);
        }
    </style>
</head>
<body>

    <div class="dot-grid"></div>

    <div class="coming-soon-label">Coming soon to iOS</div>
    <h1>Chur</h1>

    <div class="stack-container">
        <div class="card card-1">
            <div class="badge"></div>
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">CHUR</div>
                <div class="chip"></div>
            </div>
            <div style="text-align: left; font-size: 12px; font-weight: 600;">Best card</div>
        </div>
        <div class="card card-2">
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">MY BANK</div>
                <div class="chip"></div>
            </div>
        </div>
        <div class="card card-3">
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">CARD</div>
                <div class="chip"></div>
            </div>
        </div>
    </div>

    <div class="hero-footer">
        Your wallet. <span class="highlight">Smarter?</span>
    </div>

    <div class="copyright">
        &copy; 2026 Chur App
    </div>

</body>
</html>
