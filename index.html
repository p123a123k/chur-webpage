<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chur · Organize Your Rewards</title>
    <style>
        /* Chur Brand Theme */
        :root {
            --bg-color: #F3EFE4;
            --text-main: #5C5A33;
            --text-muted: #888888;
            --accent-blue: #007AFF;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.4;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 80px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Polaroid Stack Inspired Layout */
        .preview-card {
            background: white;
            padding: 15px 15px 40px 15px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transform: rotate(-2deg);
            display: inline-block;
            margin-bottom: 50px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .preview-img {
            width: 280px;
            height: 350px;
            background: #e8e4d8; /* Placeholder for your app UI */
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #aaa;
            font-style: italic;
        }

        .status-pill {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(92, 90, 51, 0.1);
            color: var(--text-main);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-pill">Coming Soon to iOS</div>
        <h1>Chur</h1>
        <p class="tagline">Your credit card rewards, organized.</p>
        
        <div class="preview-card">
            <div class="preview-img">
                [ Polaroid Stack UI Preview ]
            </div>
        </div>

        <footer>
            &copy; 2026 Chur App. Built with SwiftUI.
        </footer>
    </div>
</body>
</html>
