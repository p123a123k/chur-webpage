<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chur</title>
    <style>
        :root {
            --chur-off-white: #F3EFE4;
            --chur-olive: #5C5A33;
            --chur-medium-gray: #888888;
            --card-chase: #104b9b;
            --card-amex: #d4af37;
            --card-grocery: #1a7a4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--chur-off-white); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh; 
            font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
            overflow: hidden;
            text-align: center;
            padding-top: 10vh;
        }

        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--chur-olive) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.08;
            mask-image: radial-gradient(circle, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 80%);
            z-index: -1;
        }

        h1 {
            color: var(--chur-olive);
            font-size: 82px;
            font-weight: 800;
            letter-spacing: -4px;
            margin-bottom: 60px;
            line-height: 1;
        }

        .stack-container {
            position: relative;
            width: 240px;
            height: 180px;
            margin-bottom: 50px;
        }

        .card {
            position: absolute;
            width: 240px;
            height: 152px;
            border-radius: 14px;
            padding: 18px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Card Shine Overlay */
        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
            border-radius: 14px;
        }

        .card-1 { 
            z-index: 3; 
            transform: rotate(-4deg);
            animation: cardColorSwap 6s infinite;
        }
        .card-2 { background: var(--card-amex); transform: rotate(2deg) translateY(12px) scale(0.96); z-index: 2; opacity: 0.9; }
        .card-3 { background: #c5a059; transform: rotate(6deg) translateY(24px) scale(0.92); z-index: 1; opacity: 0.7; }

        @keyframes cardColorSwap {
            0%, 45% { background: linear-gradient(135deg, var(--card-chase), #0a3166); transform: rotate(-4deg) scale(1); }
            50% { transform: rotate(-4deg) scale(1.05); } /* Pop transition */
            55%, 100% { background: linear-gradient(135deg, var(--card-grocery), #115234); transform: rotate(-4deg) scale(1); }
        }

        .badge {
            position: absolute;
            top: -16px;
            right: -12px;
            background: var(--chur-olive);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(92, 90, 51, 0.4);
            white-space: nowrap;
            z-index: 10;
        }

        .badge::after {
            content: "5x Rewards at ABCD cafe ✨";
            animation: badgeTextSwap 6s infinite;
        }

        @keyframes badgeTextSwap {
            0%, 45% { content: "5x Rewards at ABCD cafe ✨"; opacity: 1; }
            48%, 52% { opacity: 0; }
            55%, 100% { content: "6x Rewards at Super Grocery 🛒"; opacity: 1; }
        }

        .card-issuer { font-weight: 900; font-size: 10px; letter-spacing: 1.5px; }
        .chip { width: 24px; height: 18px; background: #D4B483; border-radius: 3px; opacity: 0.8; }

        .hero-footer {
            margin-top: 20px;
        }

        .hero-footer h2 {
            font-size: 32px;
            font-weight: 700;
            color: var(--chur-olive);
            letter-spacing: -0.5px;
        }

        .highlight { color: var(--chur-medium-gray); font-weight: 400; }

        .coming-soon-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--chur-medium-gray);
            margin-top: 12px;
            display: block;
        }

        .copyright {
            position: fixed;
            bottom: 30px;
            font-size: 12px;
            color: var(--chur-medium-gray);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="dot-grid"></div>

    <h1>Chur</h1>

    <div class="stack-container">
        <div class="card card-1">
            <div class="badge"></div>
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">CHUR</div>
                <div class="chip"></div>
            </div>
            <div style="text-align: left; font-size: 12px; font-weight: 600; opacity: 0.9;">Best card</div>
        </div>
        <div class="card card-2">
            <div style="display: flex; justify-content: space-between;"><div class="card-issuer">MY BANK</div><div class="chip"></div></div>
        </div>
        <div class="card card-3">
            <div style="display: flex; justify-content: space-between;"><div class="card-issuer">CARD</div><div class="chip"></div></div>
        </div>
    </div>

    <div class="hero-footer">
        <h2>Your wallet. <span class="highlight">Smarter.</span></h2>
        <span class="coming-soon-label">Coming soon to iOS</span>
    </div>

    <div class="copyright">&copy; 2026 Chur App</div>

</body>
</html>
