<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chur</title>
    <style>
        :root {
            --chur-off-white: #F3EFE4;
            --chur-olive: #5C5A33;
            --chur-medium-gray: #888888;
            --card-chase: #104b9b;
            --card-amex: #d4af37;
            --card-gold: #c5a059;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--chur-off-white); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Dot Grid Background */
        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--chur-olive) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.08;
            mask-image: radial-gradient(circle, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 80%);
            z-index: -1;
        }

        /* Title Sitting Above Cards */
        h1 {
            color: var(--chur-olive);
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 40px;
        }

        /* Card Stack Container */
        .stack-container {
            position: relative;
            width: 240px;
            height: 180px;
            margin-bottom: 60px;
        }

        .card {
            position: absolute;
            width: 240px;
            height: 152px;
            border-radius: 14px;
            padding: 18px;
            color: white;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.5s ease;
        }

        .card-1 { background: linear-gradient(135deg, var(--card-chase), #0a3166); transform: rotate(-4deg) translateY(0); z-index: 3; }
        .card-2 { background: linear-gradient(135deg, var(--card-amex), #a38629); transform: rotate(2deg) translateY(10px); z-index: 2; opacity: 0.9; }
        .card-3 { background: linear-gradient(135deg, var(--card-gold), #8e7340); transform: rotate(6deg) translateY(20px); z-index: 1; opacity: 0.7; }

        .card-issuer { font-weight: 900; font-size: 10px; letter-spacing: 1.5px; text-align: left; }
        .chip { width: 24px; height: 18px; background: #D4B483; border-radius: 3px; opacity: 0.8; }

        /* Catchy Footer Text */
        .footer-text {
            font-size: 28px;
            font-weight: 600;
            color: var(--chur-olive);
            letter-spacing: -0.5px;
        }

        .highlight {
            color: var(--chur-medium-gray);
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="dot-grid"></div>

    <h1>Chur</h1>

    <div class="stack-container">
        <div class="card card-1">
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">CHUR</div>
                <div class="chip"></div>
            </div>
            <div style="text-align: left; font-size: 12px; font-weight: 600;">Best card</div>
        </div>
        <div class="card card-2">
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">MY BANK</div>
                <div class="chip"></div>
            </div>
        </div>
        <div class="card card-3">
            <div style="display: flex; justify-content: space-between;">
                <div class="card-issuer">CARD</div>
                <div class="chip"></div>
            </div>
        </div>
    </div>

    <div class="footer-text">
        Your wallet. <span class="highlight">Smarter?</span>
    </div>

</body>
</html>
